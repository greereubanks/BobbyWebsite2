<DOCTYPE! html>
<html>
  <head>
    <style>

      body  {
       background-color: orange;
       border:  15px ridge blue;
            }

      .slider {
    width: 800px;
    height: 450px;
    margin: 30px auto;
    overflow: hidden;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,.3);
}

.slides {
    display: flex;
    width: 400%;
    animation: slide 16s infinite;
}

.slides img {
    width: 25%;
    height:  450px;
    object-fit: contain;
}

@keyframes slide {
    0%,20% {
        transform: translateX(0);
    }

    25%,45% {
        transform: translateX(-25%);
    }

    50%,70% {
        transform: translateX(-50%);
    }

    75%,95% {
        transform: translateX(-75%);
    }

    100% {
        transform: translateX(0);
    }
}

       .header {
  border:  12px  ridge blue;
  margin-top:  20px;

  margin-left:  27%;
  length: 200x;

}

       h1 {

}

       button {

              }

    </style>

</html>
